# Nexus Agent Runtime — Default Configuration
# Model: Nexus — your personal autonomous coding model
# Each agent can have its own config.yaml in agents/<name>/config.yaml

agent_name: "Nexus"
model_name: "Nexus"
model_description: "Nexus — self-improving local AI that wraps the best available models. Competitor to Claude Opus 4.6."

model: nexus-local
nexus_base: ""
temperature: 0.15          # slight diversity improves best-of-N selection
num_ctx: 16384             # larger context = less truncation on complex tasks
task_timeout: 240          # 4 min per attempt (was 3 min)
max_retries: 3
quality_threshold: 40      # minimum passing quality (raised from 30)

# System prompt additions applied globally (from frustration research)
system_prompt_addons: []

# Claude rescue config
claude_model: nexus-remote
claude_token_cap: 200
claude_rescue_budget: 0.10
rescue_after_failures: 3

# Resource limits
max_concurrent_agents: 8
pause_ram_pct: 80.0
kill_ram_pct: 85.0
throttle_cpu_pct: 90.0
