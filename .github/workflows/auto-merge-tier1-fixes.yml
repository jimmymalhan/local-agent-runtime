name: Auto-Merge Tier 1 Fixes (PR #53)

on:
  pull_request:
    number: [53]
  workflow_dispatch:

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.number == 53 || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3

      - name: Check CI Status
        run: |
          gh pr view 53 --json statusCheckRollup | jq '.statusCheckRollup'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-Merge PR #53 on CI Pass
        run: |
          gh pr merge 53 --auto --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Deploy Agents Service
        if: success()
        run: |
          echo "PR #53 merged. Agents service will start on next system reboot."
          echo "Manual start: launchctl load ~/Library/LaunchAgents/com.nexus.agents.plist"
