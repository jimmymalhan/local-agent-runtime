name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: local-agent-runtime-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  validate:
    name: Validate Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Validate runtime (smoke test)
        run: |
          pip install fastapi uvicorn psutil 2>/dev/null || true
          python -c "import json; d=json.load(open('projects.json')); print(f'projects.json OK: {len(d[\"projects\"])} projects')"
          python -c "import agents.nexus_inference; print('nexus_inference OK')"
          python -c "import orchestrator.unified_daemon; print('unified_daemon OK')"
          echo "Runtime smoke tests passed"

      - name: Merge gate
        run: bash scripts/merge_gate.sh "$PWD"

      - name: Verify no AI co-author lines in committed files
        run: |
          echo "Checking for AI co-author references in tracked files..."
          FOUND=0
          if git grep -iE 'co-authored-by.*claude|co-authored-by.*codex|co-authored-by.*cursor|noreply@anthropic\.com|codex@openai\.com' -- '*.py' '*.sh' '*.md' '*.json' '*.yaml' '*.txt' ':!.github/workflows/ci.yml'; then
            echo "ERROR: Found AI co-author references in committed files."
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::AI co-author lines detected in committed files. Remove them before merging."
            exit 1
          fi
          echo "No AI co-author references found. Check passed."
