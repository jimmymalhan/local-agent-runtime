name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: local-agent-runtime-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  validate:
    name: Validate Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run pytest on all tests
        run: python -m pytest tests/ -v

      - name: Merge gate
        run: bash scripts/merge_gate.sh "$PWD"

      - name: Verify no AI co-author lines in committed files
        run: |
          echo "Checking for AI co-author references in tracked files..."
          FOUND=0
          if git grep -iE 'co-authored-by.*claude|co-authored-by.*codex|co-authored-by.*cursor|noreply@anthropic\.com|codex@openai\.com' -- '*.py' '*.sh' '*.md' '*.yml' '*.json' '*.yaml' '*.txt'; then
            echo "ERROR: Found AI co-author references in committed files."
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::AI co-author lines detected in committed files. Remove them before merging."
            exit 1
          fi
          echo "No AI co-author references found. Check passed."
