name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: local-agent-runtime-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Shell syntax
        run: |
          bash -n Local
          for file in scripts/*.sh local-codex local-claude; do
            bash -n "$file"
          done

      - name: Python compile
        run: python3 -m py_compile scripts/*.py mcp-local-runtime/server.py

      - name: Unit tests
        run: python3 -m unittest discover -s tests

      - name: Session policy validation
        run: python3 scripts/validate_session_policy.py

      - name: Todo progress smoke
        run: python3 scripts/todo_progress.py

      - name: CLI smoke
        run: |
          LOCAL_AGENT_MODE=fast bash ./Local <<'EOF'
          /todo-progress
          /team
          /exit
          EOF
