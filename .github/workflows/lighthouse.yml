# FC-007: Lighthouse performance ≥90. Runs on Linux (Node/Chrome arch match).
name: Lighthouse

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse FC-007
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Detect Lighthouse target
        id: detect
        run: |
          if [ -f package.json ] && [ -f src/server.js ]; then
            echo "has_target=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_target=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_target == 'true'
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.detect.outputs.has_target == 'true'
        run: npm ci

      - name: Install Chrome (Lighthouse)
        if: steps.detect.outputs.has_target == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          export CHROME_PATH=/usr/bin/chromium-browser

      - name: Start server
        if: steps.detect.outputs.has_target == 'true'
        run: node src/server.js &
        env:
          PORT: 3000

      - name: Wait for server
        if: steps.detect.outputs.has_target == 'true'
        run: sleep 5

      - name: Run Lighthouse
        id: lighthouse
        if: steps.detect.outputs.has_target == 'true'
        run: |
          mkdir -p .claude/local
          npx lighthouse http://localhost:3000 \
            --output=json \
            --output-path=.claude/local/lighthouse-report.json \
            --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
            --only-categories=performance,accessibility \
            --quiet || true
          PERF=0
          if [ -f .claude/local/lighthouse-report.json ]; then
            PERF=$(node -e "
              const d=require('./.claude/local/lighthouse-report.json');
              const s=d.categories?.performance?.score;
              console.log(s!=null?Math.round(s*100):0);
            ")
          fi
          echo "performance=$PERF" >> $GITHUB_OUTPUT
          echo "pass=$([ "$PERF" -ge 90 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "Performance score: $PERF"
          if [ "$PERF" -lt 90 ]; then
            echo "::warning::Lighthouse performance $PERF < 90 (FC-007)"
          fi

      - name: Write lighthouse-score.json
        if: steps.detect.outputs.has_target == 'true'
        run: |
          mkdir -p .claude/local
          node -e "
            const fs=require('fs');
            let perf=0,a11y=0,status='measured';
            try {
              const d=JSON.parse(fs.readFileSync('.claude/local/lighthouse-report.json','utf8'));
              perf=Math.round((d.categories?.performance?.score||0)*100);
              a11y=Math.round((d.categories?.accessibility?.score||0)*100);
            } catch(e) {
              status='missing-report';
            }
            fs.writeFileSync('.claude/local/lighthouse-score.json', JSON.stringify({
              status,
              performance:perf,
              accessibility:a11y,
              timestamp:new Date().toISOString(),
              url:'http://localhost:3000'
            },null,2));
          "

      - name: Write skipped lighthouse-score.json
        if: steps.detect.outputs.has_target != 'true'
        run: |
          mkdir -p .claude/local
          python3 - <<'PY'
          import json
          from datetime import datetime
          body = {
              "status": "skipped",
              "performance": 0,
              "accessibility": 0,
              "timestamp": datetime.utcnow().isoformat(timespec="seconds") + "Z",
              "url": None,
              "reason": "No package.json/src/server.js Lighthouse target in this repo",
          }
          with open(".claude/local/lighthouse-score.json", "w", encoding="utf-8") as handle:
              json.dump(body, handle, indent=2)
              handle.write("\\n")
          PY

      - name: No Lighthouse target in this repo
        if: steps.detect.outputs.has_target != 'true'
        run: |
          echo "No package.json/src/server.js target found; skipping Lighthouse for this repo."

      - name: Enforce FC-007 threshold when measured
        if: steps.detect.outputs.has_target == 'true'
        run: |
          if [ "${{ steps.lighthouse.outputs.pass }}" != "true" ]; then
            echo "::error::Lighthouse performance ${{ steps.lighthouse.outputs.performance }} < 90 (FC-007)"
            exit 1
          fi
