name: "{{name}}"
version: "1.0.0"
config-version: 2

profile: "{{name}}"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  "{{name}}":
    staging:
      +materialized: view
    marts:
      +materialized: table
